<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>v3 로그인</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#eef2ff 0%,#f8f9fc 50%,#ecfdf5 100%);padding:24px}

  .card{background:#fff;border-radius:20px;padding:36px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(99,102,241,.12);border:1px solid #eaecf0}

  /* 브랜드 */
  .brand{text-align:center;margin-bottom:28px}
  .brand-mark{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px}
  .brand-name{font-size:22px;font-weight:800;color:#111827;letter-spacing:'-.5px'}
  .brand-sub{font-size:13px;color:#9ca3af;margin-top:4px}

  /* 필드 */
  .field{margin-bottom:14px}
  .field-label{font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
  .field-input{width:100%;padding:11px 14px;border:1.5px solid #eaecf0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;color:#111827;background:#f9fafb;transition:all .12s}
  .field-input:focus{border-color:#a5b4fc;background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.08)}
  .field-hint{font-size:11px;color:#9ca3af;margin-top:6px}

  /* 체크박스 */
  .chk-group{display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .chk-item{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
  .chk-box{width:18px;height:18px;border-radius:5px;background:#6366f1;border:2px solid #6366f1;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .chk-box.off{background:#fff;border-color:#d1d5db}
  .chk-label{font-size:12px;color:#374151;font-weight:600}
  .chk-label.off{color:#9ca3af;font-weight:400}

  /* 에러 */
  .err{font-size:12px;color:#e11d48;text-align:center;margin-bottom:12px;background:#fff1f2;padding:8px;border-radius:8px;border:1px solid #fecdd3}

  /* 버튼 */
  .btn{width:100%;padding:13px;background:#6366f1;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s}
  .btn:hover{background:#4f46e5}

  .version{text-align:right;margin-top:14px;font-size:11px;color:#d1d5db}
</style>
</head>
<body>

<div class="card">
  <!-- 브랜드 -->
  <div class="brand">
    <div class="brand-mark">🚛</div>
    <div class="brand-name">동태관리</div>
    <div class="brand-sub">FN퍼니 일정 관리</div>
  </div>

  <!-- 아이디 -->
  <div class="field">
    <div class="field-label">아이디</div>
    <input class="field-input" type="text" placeholder="아이디를 입력하세요" value="admin"/>
  </div>

  <!-- 비밀번호 -->
  <div class="field">
    <div class="field-label">비밀번호</div>
    <input class="field-input" type="password" placeholder="비밀번호를 입력하세요" value="1111"/>
    <div class="field-hint">기본 비밀번호 : 1111</div>
  </div>

  <!-- 체크박스 -->
  <div class="chk-group">
    <div class="chk-item">
      <div class="chk-box"><span style="color:#fff;font-size:11px;font-weight:700">✓</span></div>
      <span class="chk-label">아이디 저장</span>
    </div>
    <div class="chk-item">
      <div class="chk-box"><span style="color:#fff;font-size:11px;font-weight:700">✓</span></div>
      <span class="chk-label">비밀번호 저장</span>
    </div>
    <div class="chk-item">
      <div class="chk-box off"></div>
      <span class="chk-label off">자동 로그인</span>
    </div>
  </div>

  <button class="btn">로그인</button>
  <div class="version">v1.6.39</div>
</div>

</body>
</html>
